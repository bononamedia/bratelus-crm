{% extends 'base.html' %}

{% block title %}Create Workspace | Bratelus{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-6">
        <p class="text-xs font-semibold uppercase text-blue-600">New brand</p>
        <h1 class="mt-1 text-3xl font-semibold text-gray-950">Create a workspace</h1>
        <p class="mt-2 text-sm text-gray-500">A workspace keeps one brand's customers, team, dispatch, channels, and billing separate.</p>
    </div>
    <form method="post" class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
        {% csrf_token %}
        <div class="grid gap-5 sm:grid-cols-2">
            <label class="sm:col-span-2 text-sm font-medium text-gray-700">Workspace / brand name
                <input name="name" required maxlength="255" placeholder="Perfect Cleaning" class="mt-2 w-full rounded-lg border border-gray-300 px-3 py-2.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            </label>
            <label class="sm:col-span-2 text-sm font-medium text-gray-700">Billing email
                <input name="billing_email" type="email" value="{{ request.user.email }}" placeholder="billing@company.com" class="mt-2 w-full rounded-lg border border-gray-300 px-3 py-2.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            </label>
        </div>
        <div class="mt-6 flex items-center justify-between border-t border-gray-100 pt-5">
            <a href="{% url 'dashboard' %}" class="text-sm font-medium text-gray-500 hover:text-gray-800">Cancel</a>
            <button class="rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-blue-700">Create Workspace</button>
        </div>
    </form>
</div>
{% endblock %}
