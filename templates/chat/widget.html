<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat with {{ widget.workspace.name }}</title><style>
*{box-sizing:border-box}body{margin:0;font:14px/1.45 Arial,sans-serif;color:#172033;background:#f6f8fb}.app{height:100vh;display:flex;flex-direction:column}.head{padding:16px;color:#fff;background:{{ widget.brand_color }};box-shadow:0 1px 4px #0002}.head strong{font-size:16px}.head small{display:block;margin-top:3px;color:#ffffffcc}.messages{flex:1;overflow:auto;padding:14px}.bubble{max-width:85%;margin:8px 0;padding:10px 12px;border-radius:10px;background:#fff;box-shadow:0 1px 2px #0001}.bubble.visitor{margin-left:auto;background:{{ widget.brand_color }};color:#fff}.name{font-size:11px;opacity:.65;margin-bottom:3px}.intro{padding:16px}.intro input,.composer textarea{width:100%;margin-top:8px;border:1px solid #d6dbe5;border-radius:8px;padding:11px;font:inherit}.intro button,.composer button{border:0;border-radius:8px;background:{{ widget.brand_color }};color:#fff;padding:11px 15px;font-weight:700;cursor:pointer}.intro button{width:100%;margin-top:10px}.composer{display:flex;gap:8px;padding:10px;background:#fff;border-top:1px solid #e5e7eb}.composer textarea{margin:0;resize:none}.status{padding:7px 12px;text-align:center;font-size:12px;color:#6b7280}.hidden{display:none}
</style></head>
<body><div class="app"><header class="head"><strong>{{ widget.workspace.name }}</strong><small>Live customer support</small></header><div id="messages" class="messages">{% if not conversation %}<div class="bubble">{{ widget.greeting }}</div>{% endif %}</div><form id="intro" class="intro {% if conversation %}hidden{% endif %}"><input name="visitor_name" required placeholder="Your name"><input name="visitor_email" type="email" {% if widget.require_email %}required{% endif %} placeholder="Email{% if not widget.require_email %} (optional){% endif %}"><textarea name="body" required rows="3" placeholder="How can we help?"></textarea><button>Start chat</button></form><form id="composer" class="composer {% if not conversation %}hidden{% endif %}"><textarea name="body" required rows="1" placeholder="Write a message"></textarea><button>Send</button></form><div id="status" class="status"></div></div><script>
const storageKey='bratelus-chat-{{ widget.public_key }}';let visitorKey=localStorage.getItem(storageKey)||'';const sourcePage='{{ source_page|escapejs }}';
const messages=document.getElementById('messages'),intro=document.getElementById('intro'),composer=document.getElementById('composer'),statusEl=document.getElementById('status');
function addMessage(item){if(document.querySelector(`[data-id="${item.id}"]`))return;const wrap=document.createElement('div');wrap.dataset.id=item.id;wrap.className=`bubble ${item.is_visitor?'visitor':''}`;const name=document.createElement('div');name.className='name';name.textContent=item.sender_name||'Team';const body=document.createElement('div');body.textContent=item.body;wrap.append(name,body);messages.append(wrap);messages.scrollTop=messages.scrollHeight;}
async function poll(){if(!visitorKey)return;const response=await fetch(`?format=json&visitor_key=${encodeURIComponent(visitorKey)}`);if(!response.ok)return;const data=await response.json();if(data.status!=='new'){intro.classList.add('hidden');composer.classList.remove('hidden');}data.messages.forEach(addMessage);if(data.status==='closed'){composer.classList.add('hidden');statusEl.textContent='This conversation has been closed.';}}
async function send(form){const data=new FormData(form);data.append('visitor_key',visitorKey);data.append('page_url',sourcePage);const response=await fetch('',{method:'POST',body:data});const result=await response.json();if(!response.ok){statusEl.textContent=result.error||'Unable to send.';return;}visitorKey=result.visitor_key;localStorage.setItem(storageKey,visitorKey);intro.classList.add('hidden');composer.classList.remove('hidden');form.reset();statusEl.textContent='Sent';await poll();}
intro.addEventListener('submit',event=>{event.preventDefault();send(intro)});composer.addEventListener('submit',event=>{event.preventDefault();send(composer)});poll();setInterval(poll,3000);
</script></body></html>
