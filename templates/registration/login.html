<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Bratelus CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">
                Bratelus<span class="text-blue-600">.</span>
            </h1>
            <p class="text-sm text-gray-500 mt-2">Sign in to your workspace</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-6 flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="username" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg shadow-sm transition-colors mt-2">
                Sign In
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">Waiting for account activation? <a href="{% url 'email_verification_pending' %}" class="font-semibold text-blue-600 hover:text-blue-700">Resend verification email</a></p>

        <div class="my-6 flex items-center gap-3"><span class="h-px flex-1 bg-gray-200"></span><span class="text-xs font-medium uppercase text-gray-400">Field team</span><span class="h-px flex-1 bg-gray-200"></span></div>
        <button type="button" onclick="signInWithPasskey()" class="flex w-full items-center justify-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-semibold text-gray-800 hover:bg-gray-50">
            <svg class="h-5 w-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11a3 3 0 100-6 3 3 0 000 6zm0 0v10m-4-4h8M5 11a7 7 0 1114 0"/></svg>
            Sign in with Face ID / passkey
        </button>
        <p id="passkey-error" class="mt-3 hidden text-center text-sm text-red-600"></p>

    </div>

<script>
function b64ToBuffer(value) { const base64 = value.replace(/-/g, '+').replace(/_/g, '/'); const raw = atob(base64.padEnd(Math.ceil(base64.length / 4) * 4, '=')); return Uint8Array.from(raw, c => c.charCodeAt(0)); }
function bufferToB64(value) { return btoa(String.fromCharCode(...new Uint8Array(value))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); }
function publicKeyFromJSON(options) { options.challenge = b64ToBuffer(options.challenge); (options.allowCredentials || []).forEach(item => item.id = b64ToBuffer(item.id)); return options; }
function credentialToJSON(credential) { return { id: credential.id, rawId: bufferToB64(credential.rawId), type: credential.type, response: { authenticatorData: bufferToB64(credential.response.authenticatorData), clientDataJSON: bufferToB64(credential.response.clientDataJSON), signature: bufferToB64(credential.response.signature), userHandle: credential.response.userHandle ? bufferToB64(credential.response.userHandle) : null } }; }
async function signInWithPasskey() {
    const error = document.getElementById('passkey-error'); error.classList.add('hidden');
    const username = document.getElementById('username').value.trim();
    if (!username) { error.textContent = 'Enter your username or email first.'; error.classList.remove('hidden'); return; }
    try {
        const optionsResponse = await fetch('/api/passkeys/login/options/', {method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value}, body: JSON.stringify({username})});
        const options = await optionsResponse.json(); if (!optionsResponse.ok) throw new Error(options.error);
        const credential = await navigator.credentials.get({publicKey: publicKeyFromJSON(options)});
        const verifyResponse = await fetch('/api/passkeys/login/verify/', {method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value}, body: JSON.stringify(credentialToJSON(credential))});
        const result = await verifyResponse.json(); if (!verifyResponse.ok) throw new Error(result.error); window.location.href = result.redirect;
    } catch (err) { error.textContent = err.message || 'Face ID sign-in was cancelled.'; error.classList.remove('hidden'); }
}
</script>
</body>
</html>
