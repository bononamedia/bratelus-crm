services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=bratelus_crm
      - POSTGRES_USER=crm_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - /opt/bratelus-crm:/app  # <--- FIXED ABSOLUTE PATH
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A core worker -l info
    volumes:
      - /opt/bratelus-crm:/app  # <--- FIXED ABSOLUTE PATH
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A core beat -l info
    volumes:
      - /opt/bratelus-crm:/app  # <--- FIXED ABSOLUTE PATH
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
